<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atarashi CONTADO — Panel Master V2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --negro-fondo: #0a0a0a;
    --negro-tarjeta: #121212;
    --negro-panel: #181818;
    --dorado: #C9A02A;
    --dorado-brillante: #F0C040;
    --blanco: #F5F2EA;
    --gris: #888880;
    --fuente-titulo: 'Bebas Neue', sans-serif;
    --fuente-cuerpo: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--negro-fondo); font-family: var(--fuente-cuerpo); color: var(--blanco); padding: 20px 12px 60px; }

  header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(201,160,42,0.1); }
  header h1 { font-family: var(--fuente-titulo); font-size: 42px; letter-spacing: 4px; color: var(--blanco); }
  header h1 span { color: var(--dorado-brillante); }
  header p { font-size: 13px; color: var(--gris); margin-top: 5px; }

  .contenedor-master { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 30px; }
  @media(min-width: 900px) { .contenedor-master { grid-template-columns: 410px 1fr; } }

  /* ── PANEL FORMULARIO ── */
  .panel-formulario { background: var(--negro-panel); border: 1px solid var(--dorado); border-radius: 12px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
  .panel-formulario h2 { font-family: var(--fuente-titulo); font-size: 26px; letter-spacing: 1px; margin-bottom: 15px; color: var(--dorado); }

  /* ── CATEGORÍAS ── */
  .caja-admin-categorias { background: rgba(255,255,255,0.02); border: 1px solid rgba(201,160,42,0.2); border-radius: 8px; padding: 12px; margin-bottom: 20px; }
  .caja-admin-categorias h3 { font-size: 12px; text-transform: uppercase; color: var(--dorado); margin-bottom: 8px; letter-spacing: 0.5px; }
  .lista-tags-categorias { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
  .tag-cat { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .btn-borrar-cat { background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; font-size: 13px; line-height: 1; padding: 0 2px; }
  .form-nueva-cat { display: flex; gap: 5px; align-items: stretch; }
  .form-nueva-cat select { flex: 0 0 auto; width: 95px; background: #0d0d0d; border: 1px solid rgba(201,160,42,0.3); color: #fff; border-radius: 6px; padding: 6px 4px; font-size: 12px; outline: none; }
  .form-nueva-cat input { flex: 1; background: #0d0d0d; border: 1px solid rgba(201,160,42,0.3); color: #fff; border-radius: 6px; padding: 6px 8px; font-family: var(--fuente-cuerpo); font-size: 13px; outline: none; }
  .form-nueva-cat input:focus { border-color: var(--dorado-brillante); }
  .btn-ok-cat { flex: 0 0 auto; background: var(--dorado); color: #000; border: none; border-radius: 6px; padding: 6px 12px; font-weight: 900; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn-ok-cat:hover { background: var(--dorado-brillante); }

  /* ── CAMPOS FORMULARIO ── */
  .grupo-campo { margin-bottom: 12px; }
  .grupo-campo label { display: block; font-size: 11px; color: var(--gris); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
  .grupo-campo input, .grupo-campo select { width: 100%; background: #0d0d0d; border: 1px solid rgba(201,160,42,0.3); color: #fff; padding: 9px 10px; border-radius: 6px; font-family: var(--fuente-cuerpo); font-size: 14px; outline: none; }
  .grupo-campo input:focus, .grupo-campo select:focus { border-color: var(--dorado-brillante); }
  .grupo-campo textarea { width:100%; background:#0d0d0d; border:1px solid rgba(201,160,42,0.3); color:#fff; padding:9px 10px; border-radius:6px; font-family:var(--fuente-cuerpo); font-size:13px; outline:none; resize:vertical; min-height:72px; line-height:1.5; }
  .grupo-campo textarea:focus { border-color: var(--dorado-brillante); }

  .caja-paso-uno { background: rgba(201,160,42,0.05); border: 1px dashed rgba(201,160,42,0.3); padding: 12px; border-radius: 8px; margin-bottom: 14px; }

  /* ── CAMPO PRECIO DESTACADO ── */
  .campo-precio-box { background: rgba(201,160,42,0.07); border: 1px solid rgba(201,160,42,0.5); border-radius: 8px; padding: 12px; margin-bottom: 14px; }
  .campo-precio-box label { display: block; font-size: 12px; color: var(--dorado-brillante); font-weight: 800; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-precio { width: 100%; background: #0a0a0a; border: 2px solid var(--dorado-brillante); color: var(--dorado-brillante); padding: 10px; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; outline: none; text-align: center; }
  .input-precio::placeholder { color: rgba(240,192,64,0.3); }
  .input-precio:focus { border-color: #FFD700; box-shadow: 0 0 12px rgba(255,215,0,0.2); }

  /* ── BOTONES ── */
  .btn-primario { width: 100%; background: var(--dorado); color: #000; border: none; padding: 13px; border-radius: 6px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 8px; transition: background 0.2s; }
  .btn-primario:hover { background: var(--dorado-brillante); }
  .btn-verde { width: 100%; background: #27ae60; color: #fff; border: none; padding: 13px; border-radius: 6px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: background 0.2s; }
  .btn-verde:hover { background: #2ecc71; }
  .btn-azul { width: 100%; background: #1a3a5c; color: #a8d4ff; border: 1px solid #4a90d9; padding: 12px; border-radius: 6px; font-weight: 800; font-size: 13px; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
  .btn-azul:hover { background: #1e4a7a; }
  .btn-cancelar { width: 100%; background: #721c24; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 8px; }
  .btn-cancelar:hover { background: #bd2130; }

  /* ── TABLA PRODUCTOS ── */
  .panel-lista h2 { font-family: var(--fuente-titulo); font-size: 28px; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid rgba(201,160,42,0.1); padding-bottom: 5px; }
  .tabla-wrap { overflow-x: auto; }
  .tabla-productos { width: 100%; border-collapse: collapse; background: var(--negro-tarjeta); border-radius: 8px; overflow: hidden; }
  .tabla-productos th, .tabla-productos td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; vertical-align: middle; }
  .tabla-productos th { background: rgba(201,160,42,0.1); color: var(--dorado); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
  .mini-img { width: 48px; height: 48px; object-fit: contain; background: #1a1a1a; border-radius: 4px; border: 1px solid rgba(201,160,42,0.2); }
  .precio-tabla { font-family: var(--fuente-titulo); font-size: 22px; color: var(--dorado-brillante); letter-spacing: 1px; }
  .btn-tabla { color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 4px; }
  .btn-editar { background: #0056b3; } .btn-editar:hover { background: #004085; }
  .btn-borrar { background: #721c24; } .btn-borrar:hover { background: #bd2130; }

  /* ── FOTO PREVIEW ── */
  .preview-fotos-caja { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .preview-foto-wrapper { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
  .preview-mini-foto { width: 100%; height: 100%; object-fit: cover; border: 1px solid var(--dorado); border-radius: 4px; display: block; }
  .preview-foto-x { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #ff4444; color: #fff; border: none; border-radius: 50%; font-size: 11px; cursor: pointer; font-weight: 900; display: flex; align-items: center; justify-content: center; }
  .preview-foto-x:hover { background: #cc0000; }
</style>
</head>

<header>
  <h1>ATARASHI <span>CONTADO</span></h1>
  <p>Panel Master V2.0 — Ventas Inmediatas · Pago Contraentrega · Cali</p>
</header>

<!-- ── BARRA DE ESTADO ── -->
<div id="statusNube" style="text-align:center;background:#111;padding:10px;border-radius:8px;margin:-10px auto 25px;max-width:1200px;font-size:13px;border:1px solid #222;">

          <option value="🖥️">🖥️ Cómputo</option>
          <option value="🏠">🏠 Hogar</option>

<script>
// ═══════════════════════════════════════════════════════════
// SECCIÓN 1 — CONFIGURACIÓN
// ═══════════════════════════════════════════════════════════

const ARCHIVO_DATOS = 'productos_contado.json';

const CONFIG_GITHUB = {
  REPOSITORIO: 'moneco615-boop/ATARASHI-CONTADO-DATA',
  getToken: function() {
    let t = localStorage.getItem('atarashi_cloud_token');
    if (!t) {
      t = prompt('Introduce tu Token de GitHub (ghp_... o github_pat_...):');
      if (t) localStorage.setItem('atarashi_cloud_token', t.trim());
    }
    return t;
  }
};

const CONFIG_CLOUDINARY = {
  getCloudName: () => localStorage.getItem('atarashi_cloudinary_name') || '',
  getPreset:    () => localStorage.getItem('atarashi_cloudinary_preset') || '',
  isReady: function() { return !!(this.getCloudName() && this.getPreset()); }
};

// ── Configurar Cloudinary ──
function configurarCloudinary() {
  const nombre = prompt(
    '☁️ PASO 1 — Cloud Name de Cloudinary\n' +
    '(Esquina superior izquierda de tu dashboard en cloudinary.com)\n\n' +
    'Actual: ' + (CONFIG_CLOUDINARY.getCloudName() || '(vacío)') + '\n\nEscribe tu Cloud Name:'
  );
  if (!nombre) return;
  localStorage.setItem('atarashi_cloudinary_name', nombre.trim());

  const preset = prompt(
    '☁️ PASO 2 — Upload Preset\n' +
    '(Settings → Upload → Upload Presets → crear con Signing Mode "Unsigned")\n\n' +
    'Actual: ' + (CONFIG_CLOUDINARY.getPreset() || '(vacío)') + '\n\nEscribe el nombre del Preset:'
  );
  if (!preset) return;
  localStorage.setItem('atarashi_cloudinary_preset', preset.trim());
  alert('✅ Cloudinary configurado:\nCloud: ' + nombre.trim() + '\nPreset: ' + preset.trim());
}

// ── Configurar Token GitHub ──
function configurarTokenManualmente() {
  const t = prompt('Introduce tu Token de GitHub (ghp_... o github_pat_...):');
  if (t) {
    localStorage.setItem('atarashi_cloud_token', t.trim());
    cargarDesdeGitHub();
  }
}

// ── Configurar WhatsApp ──
function configurarWA() {
  const actual = localStorage.getItem('atarashi_wa_contado') || '';
  const num = prompt(
    '📱 Número WhatsApp para recibir pedidos\n' +
    'Formato: código país + número (sin +, sin espacios)\n' +
    'Ejemplo: 573001234567\n\n' +
    'Actual: ' + (actual || '(no configurado)') + '\n\nEscribe el número:'
  );
  if (num && num.trim()) {
    localStorage.setItem('atarashi_wa_contado', num.trim());
    alert('✅ WhatsApp guardado: ' + num.trim());
  }
}

// ── Configurar Logo Portada ──
function configurarLogoPortada() {
  const actual = localStorage.getItem('atarashi_logo_portada') || '';
  const url = prompt(
    '🖼️ Logo para la portada del catálogo\n\n' +
    'Pega la URL pública de tu logo PNG sin fondo.\n' +
    'Recomendado: súbelo a Cloudinary y copia el enlace https://...\n\n' +
    'Actual: ' + (actual || '(sin logo)') + '\n\n' +
    'Deja vacío para quitar el logo:'
  );

  if (url === null) return;

  if (!url.trim()) {
    localStorage.removeItem('atarashi_logo_portada');
    alert('Logo de portada eliminado. Se usará el texto ATARASHI STORE.');
    return;
  }

  localStorage.setItem('atarashi_logo_portada', url.trim());
  alert('✅ Logo de portada guardado. Publica cambios para verlo en el catálogo.');
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 2 — UTILIDADES UTF-8 / BASE64
// ═══════════════════════════════════════════════════════════

function utf8ToBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function base64ToUtf8(base64) {
  const binaryStr = atob(base64);
  const bytes = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 3 — ESTADO Y ALMACENAMIENTO (Claves exclusivas CONTADO)
// ═══════════════════════════════════════════════════════════

let productos = JSON.parse(localStorage.getItem('atarashi_prod_contado') || '[]');
let imagenesCargadasActuales = [];
let videoActualUrl = '';

// Categorías por defecto con todos los tipos solicitados
let categoriasValidas = JSON.parse(localStorage.getItem('atarashi_cat_contado') || 'null') || [
  { emoji: '👩',  nombre: 'Dama'              },
  { emoji: '👨',  nombre: 'Caballero'         },
  { emoji: '👟',  nombre: 'Calzado'           },

  { emoji: '💻',  nombre: 'Tecnología'        },
  { emoji: '🎧',  nombre: 'Audio'             },
  { emoji: '🖥️', nombre: 'Cómputo'           },
  { emoji: '🏠',  nombre: 'Hogar'             },
  { emoji: '💍',  nombre: 'Accesorios'        },
  { emoji: '🏍️', nombre: 'Moto'              },
  { emoji: '📱',  nombre: 'Accesorios Celular'}
];

function sincStorage() {
  localStorage.setItem('atarashi_prod_contado', JSON.stringify(productos));
  localStorage.setItem('atarashi_cat_contado', JSON.stringify(categoriasValidas));
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 4 — UI: CATEGORÍAS Y TABLA
// ═══════════════════════════════════════════════════════════

function renderCategoriasUI() {
  const cont = document.getElementById('listaCategoriasContenedor');
  const sel  = document.getElementById('pCategoria');
  if (!cont || !sel) return;
  cont.innerHTML = '';
  sel.innerHTML  = '';

  categoriasValidas.forEach((cat, i) => {
    // Tags visuales
    const tag = document.createElement('span');
    tag.className = 'tag-cat';
    tag.innerHTML = cat.emoji + ' ' + cat.nombre +
      ' <button class="btn-borrar-cat" onclick="eliminarCategoria(' + i + ')">×</button>';
    cont.appendChild(tag);

    // Options del select
    const opt = document.createElement('option');
    opt.value = cat.nombre;
    opt.textContent = cat.emoji + ' ' + cat.nombre;
    sel.appendChild(opt);
  });
}

function agregarNuevaCategoria() {
  const emoji = document.getElementById('newCatEmoji').value;
  const nom   = document.getElementById('newCatNombre').value.trim();

  if (!nom) {
    alert('Escribe el nombre de la categoría.');
    return;
  }

  const nomF = nom.charAt(0).toUpperCase() + nom.slice(1);

  if (categoriasValidas.some(c => c.nombre.toUpperCase() === nomF.toUpperCase())) {
    alert('Esta categoría ya existe.');
    return;
  }

  categoriasValidas.push({ emoji, nombre: nomF });
  document.getElementById('newCatNombre').value = '';
  sincStorage();
  renderCategoriasUI();
}

function eliminarCategoria(i) {
  const nom = categoriasValidas[i].nombre;
  if (confirm('¿Eliminar la categoría "' + nom + '"?\n(Los productos existentes mantendrán su categoría.)')) {
    categoriasValidas.splice(i, 1);
    sincStorage();
    renderCategoriasUI();
  }
}

function renderTabla() {
  const tbody = document.getElementById('tablaCuerpo');
  if (!tbody) return;
  tbody.innerHTML = '';
  document.getElementById('contador').textContent = productos.length;

  if (productos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--gris);padding:30px;">No hay productos aún. Añade el primero.</td></tr>';
    return;
  }

  productos.forEach((p, idx) => {
    const cat       = categoriasValidas.find(c => c.nombre === p.categoria) || {};
    const emojiCat  = cat.emoji || '📦';
    const precioFmt = '$' + p.precioContado.toLocaleString('es-CO');
    const estadoBadge = p.disponibilidad === 'transito'
      ? '<span style="background:rgba(201,160,42,0.15);color:var(--dorado-brillante);font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;">🚚 TRÁNSITO</span>'
      : '<span style="background:rgba(46,204,113,0.1);color:#2ecc71;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;">✅ DISPONIBLE</span>';

    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><img src="' + (p.imagenes[0] || 'https://via.placeholder.com/48') + '" class="mini-img"></td>' +
      '<td style="font-weight:700;text-transform:uppercase;max-width:160px;">' + p.nombre + '</td>' +
      '<td>' + emojiCat + ' ' + (p.categoria || '—') + '</td>' +
      '<td class="precio-tabla">' + precioFmt + '</td>' +
      '<td>' + estadoBadge + '</td>' +
      '<td>' +
        '<button class="btn-tabla btn-editar" onclick="cargarProductoParaEditar(' + p.id + ')">Editar</button>' +
        '<button class="btn-tabla btn-borrar"  onclick="eliminarProducto(' + idx + ')">Borrar</button>' +
      '</td>';
    tbody.appendChild(tr);
  });
}

async function subirACloudinary(base64) {
  const cloudName = CONFIG_CLOUDINARY.getCloudName();
  const preset    = CONFIG_CLOUDINARY.getPreset();
  if (!cloudName || !preset) throw new Error('Configura Cloudinary primero (botón ☁️ Cloudinary).');

  const fd = new FormData();
  fd.append('file', base64);
  fd.append('upload_preset', preset);
  fd.append('folder', 'atarashi_contado');

  const res = await fetch('https://api.cloudinary.com/v1_1/' + cloudName + '/image/upload', {
    method: 'POST',
    body: fd
  });
  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    throw new Error('Error Cloudinary: ' + (errData.error?.message || res.status));
  }
  const data = await res.json();
  return data.secure_url;
}

function procesarFotos(input) {
  const contenedor = document.getElementById('previewFotosContenedor');
  if (!input.files || input.files.length === 0) return;

  if (!CONFIG_CLOUDINARY.isReady()) {
    alert('⚠️ Configura Cloudinary antes de subir fotos.\nHaz clic en el botón ☁️ Cloudinary.');
    configurarCloudinary();
    return;
  }

  Array.from(input.files).forEach(file => {
    const lector = new FileReader();
    lector.onload = e => {
      const imgAux = new Image();
      imgAux.onload = async () => {
        // Comprimir a máx 800px
        const canvas = document.createElement('canvas');
        let w = imgAux.width, h = imgAux.height;
        const maxD = 800;
        if (w > maxD || h > maxD) {
          if (w > h) { h = Math.round(h * maxD / w); w = maxD; }
          else       { w = Math.round(w * maxD / h); h = maxD; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(imgAux, 0, 0, w, h);
        const base64 = canvas.toDataURL('image/jpeg', 0.72);

        // Preview con estado de carga
        const wrapper = document.createElement('div');
        wrapper.className = 'preview-foto-wrapper';

        const imgPrev = document.createElement('img');
        imgPrev.src = base64;
        imgPrev.className = 'preview-mini-foto';
        imgPrev.style.opacity = '0.45';

        const badge = document.createElement('div');
        badge.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);color:#F0C040;font-size:9px;text-align:center;padding:2px;border-radius:0 0 4px 4px;';
        badge.textContent = '⏳ Subiendo...';

        wrapper.appendChild(imgPrev);
        wrapper.appendChild(badge);
        contenedor.appendChild(wrapper);

        try {
          const urlPublica = await subirACloudinary(base64);
          imagenesCargadasActuales.push(urlPublica);

          imgPrev.style.opacity = '1';
          badge.style.background = 'rgba(0,110,0,0.85)';
          badge.style.color = '#7fff7f';
          badge.textContent = '✅ OK';
          setTimeout(() => badge.remove(), 2200);

          // Botón para quitar foto
          const btnX = document.createElement('button');
          btnX.className = 'preview-foto-x';
          btnX.textContent = '×';
          btnX.type = 'button';
          btnX.onclick = () => {
            const idx = imagenesCargadasActuales.indexOf(urlPublica);
            if (idx !== -1) imagenesCargadasActuales.splice(idx, 1);
            wrapper.remove();
          };
          wrapper.appendChild(btnX);

        } catch(err) {
          badge.style.background = 'rgba(160,0,0,0.85)';
          badge.style.color = '#ffaaaa';
          badge.textContent = '❌ Error';
          badge.title = err.message;
          alert('❌ No se pudo subir la imagen:\n' + err.message);
        }
      };
      imgAux.src = e.target.result;
    };
    lector.readAsDataURL(file);
  });
}

async function procesarVideo(input) {
  if (!input.files || !input.files[0]) return;
  if (!CONFIG_CLOUDINARY.isReady()) {
    alert('⚠️ Configura Cloudinary primero (botón ☁️ Cloudinary).');
    configurarCloudinary(); return;
  }
  const file = input.files[0];
  const maxSize = 50 * 1024 * 1024;
  if (file.size > maxSize) { alert('El video debe pesar menos de 50MB.'); input.value = ''; return; }

  const cont = document.getElementById('previewVideoContenedor');
  cont.innerHTML = '<p style="color:#F0C040;font-size:13px;margin-top:8px;">⏳ Subiendo video... (puede tardar 1-2 min)</p>';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CONFIG_CLOUDINARY.getPreset());
  fd.append('folder', 'atarashi_contado/videos');

  try {
    const res  = await fetch('https://api.cloudinary.com/v1_1/' + CONFIG_CLOUDINARY.getCloudName() + '/video/upload', { method:'POST', body:fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Error Cloudinary');

    videoActualUrl = data.secure_url;
    cont.innerHTML =
      '<video src="' + videoActualUrl + '" controls muted style="width:100%;max-height:120px;border-radius:6px;margin-top:8px;background:#000;"></video>' +
      '<button type="button" onclick="videoActualUrl=\'\';document.getElementById(\'previewVideoContenedor\').innerHTML=\'\';document.getElementById(\'pArchivoVideo\').value=\'\'" style="background:#721c24;color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:12px;margin-top:6px;cursor:pointer;">✕ Quitar video</button>';
  } catch(err) {
    cont.innerHTML = '<p style="color:#ff4444;font-size:13px;margin-top:6px;">❌ Error: ' + err.message + '</p>';
  }
}

function guardarFormulario(e) {
  e.preventDefault();
  const idModo = document.getElementById('pIdModo').value;

  // Solo URLs confirmadas de Cloudinary
  const urlsOK = imagenesCargadasActuales.filter(u => u && typeof u === 'string' && u.startsWith('http'));

  if (urlsOK.length === 0) {
    alert('⚠️ Agrega al menos una foto y espera a que aparezca ✅ OK antes de guardar.');
    return;
  }

  const precio = parseFloat(document.getElementById('pPrecioContado').value);
  if (!precio || precio < 1000) {
    alert('⚠️ Ingresa un precio válido (mínimo $1.000).');
    return;
  }

  const datosProd = {
    nombre:        document.getElementById('pNombre').value.toUpperCase().trim(),
    categoria:     document.getElementById('pCategoria').value,
    badge:         document.getElementById('pBadgeSelect').value,
    disponibilidad: document.getElementById('pDisponibilidad').value,
    precioContado: precio,
    descripcion:   document.getElementById('pDescripcion').value.trim(),
    imagenes:      urlsOK.slice(),
    video:         videoActualUrl || ''
  };

  if (idModo) {
    const idx = productos.findIndex(p => p.id == idModo);
    if (idx !== -1) { datosProd.id = parseInt(idModo); productos[idx] = datosProd; }
    cancelarEdicion();
  } else {
    datosProd.id = Date.now();
    productos.push(datosProd);
    document.getElementById('formProducto').reset();
    document.getElementById('previewFotosContenedor').innerHTML = '';
    imagenesCargadasActuales = [];
  }

  sincStorage();
  renderTabla();
}

function cargarProductoParaEditar(id) {
  const prod = productos.find(p => p.id === id);
  if (!prod) return;

  document.getElementById('tituloFormulario').textContent = '✏️ Editando Producto';
  document.getElementById('btnGuardarForm').textContent   = 'Actualizar Cambios';
  document.getElementById('btnCancelarEdit').style.display = 'block';

  document.getElementById('pIdModo').value       = prod.id;
  document.getElementById('pNombre').value       = prod.nombre;
  document.getElementById('pCategoria').value    = prod.categoria;
  document.getElementById('pBadgeSelect').value  = prod.badge || '';
  document.getElementById('pDisponibilidad').value = prod.disponibilidad || 'inmediata';
  document.getElementById('pPrecioContado').value  = prod.precioContado;
  document.getElementById('pDescripcion').value    = prod.descripcion || '';

  imagenesCargadasActuales = prod.imagenes.slice();
  const cont = document.getElementById('previewFotosContenedor');
  cont.innerHTML = '';

  imagenesCargadasActuales.forEach(src => {
    const wrapper = document.createElement('div');
    wrapper.className = 'preview-foto-wrapper';
    const img = document.createElement('img');
    img.src = src; img.className = 'preview-mini-foto';
    const btnX = document.createElement('button');
    btnX.className = 'preview-foto-x'; btnX.textContent = '×'; btnX.type = 'button';
    btnX.onclick = () => {
      const i = imagenesCargadasActuales.indexOf(src);
      if (i !== -1) imagenesCargadasActuales.splice(i, 1);
      wrapper.remove();
    };
    wrapper.appendChild(img); wrapper.appendChild(btnX); cont.appendChild(wrapper);
  });

  // Video preview
  videoActualUrl = prod.video || '';
  const vcont = document.getElementById('previewVideoContenedor');
  if (vcont) {
    vcont.innerHTML = prod.video
      ? '<video src="' + prod.video + '" controls muted style="width:100%;max-height:100px;border-radius:6px;margin-top:8px;background:#000;"></video>'
        + '<button type="button" onclick="videoActualUrl=\'\';document.getElementById(\'previewVideoContenedor\').innerHTML=\'\';document.getElementById(\'pArchivoVideo\').value=\'\'" style="background:#721c24;color:#fff;border:none;padding:3px 10px;border-radius:4px;font-size:12px;margin-top:5px;cursor:pointer;">✕ Quitar</button>'
      : '';
  }

  document.querySelector('.panel-formulario').scrollIntoView({ behavior: 'smooth' });
}

function cancelarEdicion() {
  document.getElementById('tituloFormulario').textContent  = 'Añadir Producto';
  document.getElementById('btnGuardarForm').textContent    = '💾 Guardar Producto';
  document.getElementById('btnCancelarEdit').style.display = 'none';
  document.getElementById('pIdModo').value = '';
  document.getElementById('formProducto').reset();
  document.getElementById('previewFotosContenedor').innerHTML = '';
  imagenesCargadasActuales = [];
  videoActualUrl = '';
  const vc = document.getElementById('previewVideoContenedor');
  if (vc) vc.innerHTML = '';
  const vi = document.getElementById('pArchivoVideo');
  if (vi) vi.value = '';
}

function eliminarProducto(idx) {
  if (confirm('¿Borrar "' + productos[idx].nombre + '"? Esta acción no se puede deshacer.')) {
    productos.splice(idx, 1);
    sincStorage();
    renderTabla();
  }
}

async function cargarDesdeGitHub() {
  const token = CONFIG_GITHUB.getToken();
  if (!token) return;

  const statusTexto = document.getElementById('statusTexto');
  statusTexto.innerHTML = '⏳ Conectando con la nube...';
  statusTexto.style.color = '#e67e22';

  const url = 'https://api.github.com/repos/' + CONFIG_GITHUB.REPOSITORIO + '/contents/' + ARCHIVO_DATOS;

  try {
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });

    if (res.status === 401 || res.status === 403) {
      statusTexto.innerHTML = '● Token inválido o sin permisos';
      statusTexto.style.color = '#e74c3c'; return;
    }

    if (res.ok) {
      const data = await res.json();
      let contenido = '';

      if (data.content) {
        contenido = base64ToUtf8(data.content.replace(/\s/g, ''));
      } else if (data.download_url) {
        statusTexto.innerHTML = '⏳ Descargando (archivo grande)...';
        const rd = await fetch(data.download_url);
        contenido = await rd.text();
      } else {
        throw new Error('GitHub no entregó el contenido del archivo.');
      }

      let datosParsed;
      try { datosParsed = JSON.parse(contenido); }
      catch (e) {
        statusTexto.innerHTML = '⚠️ JSON corrupto en la nube. Usa 🔧 Reparar Nube.';
        statusTexto.style.color = '#e74c3c';
        document.getElementById('btnRepararNube').style.display = 'inline-block';
        return;
      }

      if (datosParsed.productos)   productos         = datosParsed.productos;
      if (datosParsed.categorias)  categoriasValidas = datosParsed.categorias;

      sincStorage();
      renderCategoriasUI();
      renderTabla();

      statusTexto.innerHTML = '● CONECTADO — ' + productos.length + ' producto(s) sincronizados';
      statusTexto.style.color = '#2ecc71';
      document.getElementById('btnRepararNube').style.display = 'none';

    } else if (res.status === 404) {
      statusTexto.innerHTML = '● Modo Local (el archivo no existe aún en la nube — publica para crearlo)';
      statusTexto.style.color = '#f1c40f';
    } else {
      statusTexto.innerHTML = '● Error GitHub (HTTP ' + res.status + ')';
      statusTexto.style.color = '#e74c3c';
    }
  } catch (err) {
    statusTexto.innerHTML = '● Error de red: ' + err.message;
    statusTexto.style.color = '#e74c3c';
  }
}

async function guardarArchivoEnGitHub(ruta, contenidoTexto, mensajeCommit) {
  const token = CONFIG_GITHUB.getToken();
  if (!token) throw new Error('Falta el Token de GitHub');

  const url = 'https://api.github.com/repos/' + CONFIG_GITHUB.REPOSITORIO + '/contents/' + ruta;
  let sha = null;

  try {
    const resSha = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
    if (resSha.ok) { const d = await resSha.json(); sha = d.sha; }
  } catch (_) {}

  const body = { message: mensajeCommit, content: utf8ToBase64(contenidoTexto) };
  if (sha) body.sha = sha;

  const resPut = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resPut.ok) {
    const errData = await resPut.json().catch(() => ({}));
    throw new Error(errData.message || 'Error al subir a GitHub (HTTP ' + resPut.status + ')');
  }
}

async function publicarEnGitHub() {
  const btn = document.getElementById('btnCloudSync');
  const orig = btn.innerHTML;
  const waNum = localStorage.getItem('atarashi_wa_contado') || '';
  const logoUrl = localStorage.getItem('atarashi_logo_portada') || '';
  const urlPublica = 'https://moneco615-boop.github.io/ATARASHI-CONTADO-DATA/';

  if (!waNum) {
    const ok = confirm('⚠️ No has configurado el número de WhatsApp.\nLos pedidos del catálogo no llegarán a ningún lado.\n\n¿Configurar ahora?');
    if (ok) { configurarWA(); return; }
  }

  btn.innerHTML = '⏳ Paso 1/2 — Subiendo datos...';
  btn.disabled = true;

  try {
    // 1. Publicar JSON de productos
    const datosNube = { productos, categorias: categoriasValidas };
    await guardarArchivoEnGitHub(
      ARCHIVO_DATOS,
      JSON.stringify(datosNube, null, 2),
      '📦 Actualización catálogo CONTADO — Panel Master V2'
    );

    // 2. Publicar index.html (catálogo dinámico que carga el JSON en vivo)
    btn.innerHTML = '⏳ Paso 2/2 — Publicando catálogo web...';
    await guardarArchivoEnGitHub(
      'index.html',
      generarCatalogoDinamico(waNum, logoUrl),
      '🌐 Catálogo CONTADO actualizado'
    );

    const msg = '✅ ¡Todo publicado con éxito!\n\n' +
      productos.length + ' producto(s) ahora en línea.\n\n' +
      '🔗 URL de tu catálogo:\n' + urlPublica + '\n\n' +
      '(Si es la primera vez, activa GitHub Pages en Settings del repo)';
    alert(msg);

    document.getElementById('statusTexto').innerHTML =
      '● PUBLICADO — <a href="' + urlPublica + '" target="_blank" style="color:#F0C040;font-weight:bold;text-decoration:underline;">' + urlPublica + '</a>';

    cargarDesdeGitHub();
  } catch (err) {
    console.error(err);
    alert('Error al publicar: ' + err.message + '\n\nVerifica que tu Token tenga permiso "repo" completo.');
  } finally {
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}

async function repararNube() {
  if (!confirm('Esto sobreescribirá el archivo en GitHub con tus datos locales (' + productos.length + ' productos). ¿Continuar?')) return;
  const btn = document.getElementById('btnRepararNube');
  btn.disabled = true; btn.innerHTML = '⏳ Reparando...';
  try {
    await guardarArchivoEnGitHub(
      ARCHIVO_DATOS,
      JSON.stringify({ productos, categorias: categoriasValidas }, null, 2),
      '🔧 Reparación de emergencia desde Panel Master'
    );
    alert('¡Archivo reparado! La nube tiene ahora ' + productos.length + ' productos.');
    cargarDesdeGitHub();
  } catch (err) {
    alert('Error al reparar: ' + err.message);
    btn.disabled = false; btn.innerHTML = '🔧 Reparar Nube';
  }
}

.p-tit{font-size:clamp(22px,5.5vw,40px);font-weight:900;line-height:1.25;max-width:560px;margin:0 auto 14px;animation:fU .8s .5s ease forwards;opacity:0;}
.p-tit .oro{color:var(--br);}
.p-desc{font-size:clamp(14px,3.5vw,16px);color:#c8c4b4;max-width:480px;line-height:1.65;margin:0 auto 26px;animation:fU .8s .7s ease forwards;opacity:0;}
.p-pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:30px;animation:fU .8s .85s ease forwards;opacity:0;}
.p-pill{background:rgba(201,160,42,.08);border:1px solid rgba(201,160,42,.3);color:var(--br);padding:6px 14px;border-radius:30px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.p-btn{background:var(--go);color:#000;font-family:var(--T);font-size:18px;letter-spacing:3px;padding:16px 48px;border:none;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all .25s;animation:fU .8s 1s ease forwards;opacity:0;box-shadow:0 0 30px rgba(201,160,42,.25);}
.p-btn:hover{background:var(--br);transform:translateY(-2px);}
.p-nota{position:absolute;bottom:20px;font-size:10px;color:var(--gr);letter-spacing:2px;text-transform:uppercase;animation:fU .8s 1.2s ease forwards;opacity:0;}
@keyframes fD{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fU{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes eW{from{transform:scaleX(0)}to{transform:scaleX(1)}}
/* HEADER */
.s-hdr{text-align:center;padding:18px 12px 12px;border-bottom:1px solid rgba(201,160,42,.1);}
.s-hdr h1{font-family:var(--T);font-size:42px;letter-spacing:5px;}
.s-hdr h1 span{color:var(--go);}
.s-hdr small{font-size:10px;text-transform:uppercase;letter-spacing:5px;color:var(--gr);font-weight:600;}
/* TRUST */
.trust{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;padding:10px 12px;background:rgba(201,160,42,.04);border-bottom:1px solid rgba(201,160,42,.08);}
.trust span{font-size:12px;color:#c8c4b4;font-weight:600;}
/* LAYOUT */
.ctn{max-width:1200px;margin:0 auto;padding:18px 12px 60px;}
.filtros{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.fb{background:var(--ca);border:1px solid rgba(201,160,42,.2);color:var(--gr);padding:6px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--B);transition:all .2s;}
.fb.on,.fb:hover{background:var(--go);color:#000;border-color:var(--go);font-weight:700;}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
@media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
/* CARD */
.card{background:var(--ca);border:1px solid rgba(201,160,42,.1);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;position:relative;cursor:pointer;transition:transform .3s,border-color .3s,box-shadow .3s;}
.card:hover{transform:translateY(-5px);border-color:rgba(201,160,42,.4);box-shadow:0 10px 30px rgba(0,0,0,.5);}
.card-badge{position:absolute;top:10px;right:10px;background:var(--br);color:#000;font-size:10px;font-weight:900;padding:3px 9px;border-radius:3px;z-index:5;text-transform:uppercase;}
.card-img{width:100%;height:230px;background:#141414;display:flex;align-items:center;justify-content:center;padding:12px;}
.card-img img{max-width:100%;max-height:100%;object-fit:contain;}
@media(max-width:500px){.card-img{height:155px;padding:8px;}.card-img img{object-fit:cover;border-radius:4px;}}
.card-body{padding:12px 12px 0;border-top:1px solid rgba(255,255,255,.03);background:#151515;flex:1;}
.card-cat{font-size:11px;color:var(--gr);margin-bottom:3px;}
.card-name{font-family:var(--T);font-size:18px;letter-spacing:.5px;text-transform:uppercase;color:var(--wh);margin-bottom:4px;line-height:1.15;}
@media(max-width:500px){.card-name{font-size:14px;}}
.card-disp{display:inline-flex;align-items:center;gap:4px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#2ecc71;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;margin-bottom:10px;}
.card-precio{font-family:var(--T);font-size:42px;letter-spacing:2px;background:linear-gradient(135deg,#C9A02A 0%,#FFD700 45%,#F0C040 70%,#C9A02A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1;margin-bottom:6px;animation:pglow 3s ease-in-out infinite;}
.card:hover .card-precio{animation:ppulse .8s ease-in-out infinite;}
@media(max-width:500px){.card-precio{font-size:30px;}}
@keyframes pglow{0%,100%{filter:drop-shadow(0 0 3px rgba(255,215,0,.3))}50%{filter:drop-shadow(0 0 12px rgba(255,215,0,.7))}}
@keyframes ppulse{0%,100%{filter:drop-shadow(0 0 8px rgba(255,215,0,.5));transform:scale(1)}50%{filter:drop-shadow(0 0 18px rgba(255,215,0,.85));transform:scale(1.03)}}
.card-cta{width:100%;background:#25D366;color:#fff;border:none;padding:13px;font-family:var(--B);font-weight:900;font-size:12px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:background .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:5px;}
.card-cta:hover{background:#1eb358;}
/* MODAL PRODUCTO */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:10000;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
@media(min-width:620px){.modal-bg{align-items:center;padding:20px;}}
.modal-box{background:var(--pa);border:1px solid rgba(201,160,42,.25);width:100%;max-width:540px;border-radius:22px 22px 0 0;max-height:96vh;overflow-y:auto;position:relative;animation:slideUp .35s cubic-bezier(.32,1,.45,1);}
@media(min-width:620px){.modal-box{border-radius:18px;animation:scalein .3s ease;}}
@keyframes slideUp{from{transform:translateY(55%);opacity:.4}to{transform:translateY(0);opacity:1}}
@keyframes scalein{from{transform:scale(.91);opacity:0}to{transform:scale(1);opacity:1}}
.m-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,.06);}
.m-hdr-t{font-family:var(--T);font-size:20px;letter-spacing:3px;}
.m-hdr-t span{color:var(--br);}
.m-close{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.m-close:hover{background:#fff;color:#000;}
/* CAROUSEL */
.m-car{position:relative;width:100%;background:#080808;overflow:hidden;user-select:none;}
.m-track{display:flex;transition:transform .4s cubic-bezier(.25,.8,.25,1);}
.m-track.notrans{transition:none!important;}
.m-slide{flex-shrink:0;width:100%;height:310px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:zoom-in;}
.m-slide.zoomed{cursor:move;}
.m-slide img{max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;user-select:none;-webkit-user-drag:none;transform-origin:50% 50%;transition:transform .25s ease;will-change:transform;}
.m-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.18);color:var(--br);width:36px;height:36px;border-radius:50%;font-size:14px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;}
.m-arr:hover{background:rgba(0,0,0,.9);}
.m-arr.l{left:8px;}.m-arr.r{right:8px;}
.m-cnt{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:16px;pointer-events:none;white-space:nowrap;}
.m-zoom-x{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;display:none;z-index:12;}
.car-zoomed .m-zoom-x{display:block;}
.m-hint{background:#0d0d0d;text-align:center;font-size:11px;color:var(--gr);padding:5px;letter-spacing:.2px;}
.m-thumbs{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;background:#0d0d0d;scrollbar-width:none;}
.m-thumbs::-webkit-scrollbar{display:none;}
.m-thumb{flex-shrink:0;width:50px;height:50px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid transparent;opacity:.5;transition:all .2s;}
.m-thumb.on{border-color:var(--br);opacity:1;}
/* INFO */
.m-info{padding:16px 18px 20px;}
.m-nombre{font-family:var(--T);font-size:26px;letter-spacing:.5px;text-transform:uppercase;line-height:1.1;margin-bottom:4px;}
.m-cat{font-size:12px;color:var(--gr);margin-bottom:10px;}
.m-precio{font-family:var(--T);font-size:52px;letter-spacing:2px;background:linear-gradient(135deg,#C9A02A,#FFD700,#F0C040,#C9A02A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1;margin-bottom:8px;animation:pglow 3s ease-in-out infinite;}
.m-disp{display:inline-flex;align-items:center;gap:5px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.28);color:#2ecc71;font-size:12px;font-weight:700;padding:4px 12px;border-radius:12px;margin-bottom:14px;}
.m-desc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.m-desc-lbl{font-size:10px;color:var(--gr);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:6px;}
.m-desc-txt{font-size:13px;color:#d4d0c8;line-height:1.65;white-space:pre-line;}
.m-video{margin-bottom:14px;}
.m-video-lbl{font-size:10px;color:var(--gr);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:6px;}
.m-video video{width:100%;border-radius:10px;max-height:220px;background:#000;display:block;}
.m-cta{width:100%;background:#25D366;color:#fff;border:none;padding:16px;border-radius:12px;font-family:var(--B);font-weight:900;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:.5px;transition:background .2s,transform .15s;margin-top:2px;}
.m-cta:hover{background:#1eb358;}.m-cta:active{transform:scale(.98);}
/* FORM */
.fmodal-bg{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:10001;display:none;align-items:flex-end;justify-content:center;}
.fmodal-bg.show{display:flex;}
@media(min-width:620px){.fmodal-bg{align-items:center;padding:20px;}}
.fmodal-box{background:var(--pa);border:1px solid var(--go);width:100%;max-width:460px;border-radius:22px 22px 0 0;padding:22px 20px 28px;position:relative;animation:slideUp .35s cubic-bezier(.32,1,.45,1);max-height:96vh;overflow-y:auto;}
@media(min-width:620px){.fmodal-box{border-radius:16px;animation:scalein .3s ease;}}
.f-logo{font-family:var(--T);font-size:22px;letter-spacing:4px;text-align:center;margin-bottom:2px;}
.f-logo span{color:var(--br);}
.f-sub{font-size:10px;color:var(--gr);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:18px;}
.f-resumen{background:rgba(201,160,42,.06);border:1px solid rgba(201,160,42,.2);border-radius:10px;padding:12px 14px;margin-bottom:18px;}
.f-pnom{font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.f-pprecio{font-family:var(--T);font-size:30px;color:var(--br);}
.campo{margin-bottom:13px;}
.campo label{display:block;font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.campo input{width:100%;background:#0d0d0d;border:1px solid rgba(201,160,42,.3);color:#fff;padding:11px 12px;border-radius:8px;font-family:var(--B);font-size:14px;outline:none;}
.campo input:focus{border-color:var(--br);}
.f-cta{width:100%;background:#25D366;color:#fff;border:none;padding:15px;border-radius:10px;font-weight:900;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:.5px;margin-top:8px;transition:background .2s;}
.f-cta:hover{background:#1eb358;}
.f-back{width:100%;background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--gr);padding:10px;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;}
.f-back:hover{background:rgba(255,255,255,.05);}
.f-nota{font-size:10px;color:var(--gr);text-align:center;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div class="portada" id="portada">
  <div class="p-lt"></div><div class="p-lb"></div>
  ${logo ? '<img class="p-logo-img" src="' + logo.replace(/"/g, '&quot;') + '" alt="Atarashi Store">' : '<div class="p-logo">ATARASHI <span>STORE</span></div>'}
  <p class="p-sub">Tu tienda en Cali, Colombia</p>
  <div class="p-div"></div>
  <h1 class="p-tit">¿Para qué ir al centro<br>si el centro <span class="oro">puede ir a ti?</span></h1>
  <p class="p-desc">Compra desde cualquier lugar de Cali y recibe tus productos con <strong>pago contraentrega</strong>. Sin filas, sin tráfico, sin perder tiempo y con la tranquilidad de pagar solo al recibir.</p>
  <div class="p-pills"><span class="p-pill">🚚 Entrega a domicilio</span><span class="p-pill">✅ Paga al recibir</span><span class="p-pill">📦 Sin riesgos</span></div>
  <button class="p-btn" onclick="(function(){var p=document.getElementById('portada');p.style.transition='opacity .35s ease';p.style.opacity='0';p.style.pointerEvents='none';setTimeout(function(){p.style.display='none';},360)})()">VER CATÁLOGO →</button>
  <span class="p-nota">Cali · Colombia · Pagos en efectivo al recibir</span>
</div>

</header>

</div>

  <div class="grid" id="grid"><p style="color:#888;text-align:center;padding:60px;grid-column:1/-1;">⏳ Cargando productos...</p></div>
</div>
<div class="modal-bg" id="modalProd" onclick="if(event.target.id==='modalProd')cerrarModal()">

<div class="fmodal-bg" id="modalForm" onclick="if(event.target.id==='modalForm')cerrarForm()">
  <div class="fmodal-box">
    <button class="m-close" style="position:absolute;top:14px;right:14px;" onclick="cerrarForm()">&#x2715;</button>
    <p class="f-logo">ATARASHI <span>STORE</span></p>
    <p class="f-sub">Confirmar pedido · Pago al recibir</p>
    <div class="f-resumen">
      <p class="f-pnom" id="fPNom">—</p>
      <p class="f-pprecio" id="fPPrecio">$0</p>
    </div>
    <div class="campo"><label>Tu nombre completo *</label><input type="text" id="fNom" placeholder="Ej: Juan Pérez" autocomplete="name"></div>

    <button class="f-cta" onclick="enviarWA()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> PAGAR AL RECIBIR 💵</button>

<script>
  var WA='${wa}';
  var PRODS=[],CATS=[],filtro='todos',prod=null;
  var slideIdx=0,slideImgs=[],slideTimer=null;
  var SCALE=2.6,zOn=false,zOX=50,zOY=50,zOX0=50,zOY0=50;
  var ptDn=false,ptMv=false,ptX0=0,ptY0=0;
  var WA_NUM=WA;

  function fmtP(v){return '$'+Math.round(v).toLocaleString('es-CO');}
  function getEm(n){var x=CATS.find(function(c){return c.nombre===n;});return x?x.emoji:'\u{1F4E6}';}
  function esc(t){return String(t||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  /* FETCH */
  function showMsg(h){var e=document.getElementById('grid');if(e)e.innerHTML=h;}
  async function inicializar(){
    try{
      var res=await fetch('./productos_contado.json?t='+Date.now());
      if(res.status===404){showMsg('<div style="text-align:center;padding:60px;grid-column:1/-1"><p style="font-size:44px;margin-bottom:14px">\u{1F6D2}</p><p style="color:#c8c4b4;font-size:16px;font-weight:700">Cat\u00e1logo en preparaci\u00f3n</p><p style="color:#888;font-size:13px;margin-top:8px">Vuelve pronto</p></div>');return;}
      if(!res.ok)throw new Error('HTTP '+res.status);
      var data=await res.json();
      PRODS=data.productos||[];CATS=data.categorias||[];
      if(!PRODS.length){showMsg('<div style="text-align:center;padding:60px;grid-column:1/-1"><p style="font-size:44px;margin-bottom:14px">\u{1F6D2}</p><p style="color:#c8c4b4;font-size:16px;font-weight:700">Pronto habr\u00e1 productos</p></div>');return;}
      genFiltros();renderGrid();
    }catch(e){showMsg('<div style="text-align:center;padding:60px;grid-column:1/-1"><p style="font-size:40px;margin-bottom:14px">\u{1F504}</p><p style="color:#c8c4b4;font-size:15px">Error al cargar. Recarga la p\u00e1gina.</p></div>');}
  }

  /* FILTROS */
  function genFiltros(){
    var c=document.getElementById('filtros');c.innerHTML='';
    var b=document.createElement('button');b.className='fb on';b.textContent='Todos';b.onclick=function(){filtrar('todos',this);};c.appendChild(b);
    CATS.forEach(function(cat){var btn=document.createElement('button');btn.className='fb';btn.textContent=cat.emoji+' '+cat.nombre;btn.onclick=function(){filtrar(cat.nombre,this);};c.appendChild(btn);});
  }
  function filtrar(val,btn){document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});filtro=val;btn.classList.add('on');renderGrid();}

  /* GRID */
  function renderGrid(){
    var g=document.getElementById('grid');g.innerHTML='';
    var lista=filtro==='todos'?PRODS:PRODS.filter(function(p){return p.categoria===filtro;});
    if(!lista.length){g.innerHTML='<p style="color:#888;text-align:center;padding:40px;grid-column:1/-1">No hay productos en esta categor\u00eda.</p>';return;}
    lista.forEach(function(p){
      var em=getEm(p.categoria);
      var badge=p.badge?'<span class="card-badge">'+p.badge+'</span>':'';
      var disp=p.disponibilidad==='transito'?'<span class="card-disp">\u{1F69A} En camino</span>':'<span class="card-disp">\u2705 Entrega inmediata</span>';
      var div=document.createElement('div');div.className='card';

  /* MODAL */
  function abrirModal(id){
    prod=PRODS.find(function(p){return p.id===id;});if(!prod)return;
    slideImgs=prod.imagenes||[];slideIdx=0;zOn=false;zOX=50;zOY=50;
    var em=getEm(prod.categoria);
    var n=slideImgs.length;
    var disp=prod.disponibilidad==='transito'?'\u{1F69A} En camino':'\u2705 Entrega inmediata';
    var slidesH='';slideImgs.forEach(function(src){slidesH+='<div class="m-slide"><img src="'+src+'" loading="lazy" draggable="false"></div>';});
    var arrowH=n>1?'<button class="m-arr l" onclick="nextSlide(-1)">&#10094;</button><button class="m-arr r" onclick="nextSlide(1)">&#10095;</button>':'';
    var cntH=n>1?'<div class="m-cnt" id="mCnt">1 / '+n+'</div>':'';
    var zExH='<button class="m-zoom-x" id="mZX" onclick="event.stopPropagation();zoomOut()">\u2715 Salir zoom</button>';
    var thumbH='';if(n>1){slideImgs.forEach(function(s,i){thumbH+='<img src="'+s+'" class="m-thumb'+(i===0?' on':'')+'" onclick="irA('+i+')" loading="lazy">';});}
    var descH='';if(prod.descripcion&&String(prod.descripcion).trim().length>0){descH='<div class="m-desc"><p class="m-desc-lbl">\u{1F4DD} Detalles del producto</p><p class="m-desc-txt">'+esc(String(prod.descripcion).trim())+'</p></div>';}
    var videoH='';if(prod.video&&String(prod.video).trim().length>0){videoH='<div class="m-video"><p class="m-video-lbl">\u{1F3A5} Video del producto</p><video src="'+prod.video+'" controls playsinline preload="metadata"></video></div>';}

      '<div class="m-hdr"><div class="m-hdr-t">ATARASHI <span>STORE</span></div><button class="m-close" onclick="cerrarModal()">&#x2715;</button></div>'+
      '<div class="m-car" id="mCar"><div class="m-track" id="mTrack">'+slidesH+'</div>'+arrowH+cntH+zExH+'</div>'+
      (n>0?'<p class="m-hint">\u{1F446} Toca la foto para ampliar \u00b7 Arrastra para explorar \u00b7 Toca de nuevo para cerrar</p>':'')+
      (thumbH?'<div class="m-thumbs">'+thumbH+'</div>':'')+
      '<div class="m-info">'+
        '<h2 class="m-nombre">'+prod.nombre+'</h2>'+
        '<p class="m-cat">'+em+' '+prod.categoria+'</p>'+
        '<span class="m-precio">'+fmtP(prod.precioContado)+'</span>'+
        '<div class="m-disp">'+disp+'</div>'+
        descH+videoH+
        '<button class="m-cta" onclick="abrirForm()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> PAGAR AL RECIBIR \u{1F4B5}</button>'+

      car.addEventListener('mousedown',onDown);
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);

  }

  function cerrarModal(){
    stopTimer();zoomOut();ptDn=false;
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onUp);
    document.getElementById('modalProd').classList.remove('show');
    prod=null;
  }

  /* CAROUSEL */
  function syncSlider(){
    var t=document.getElementById('mTrack');if(t)t.style.transform='translateX(-'+(slideIdx*100)+'%)';
    var ct=document.getElementById('mCnt');if(ct)ct.textContent=(slideIdx+1)+' / '+slideImgs.length;
    document.querySelectorAll('.m-thumb').forEach(function(th,i){th.classList.toggle('on',i===slideIdx);});
  }
  function irA(i){if(zOn){zoomOut();return;}slideIdx=i;syncSlider();resetTimer();}
  function nextSlide(dir){if(zOn){zoomOut();return;}slideIdx=(slideIdx+dir+slideImgs.length)%slideImgs.length;syncSlider();resetTimer();}
  function startTimer(){stopTimer();if(slideImgs.length<=1||zOn)return;slideTimer=setInterval(function(){if(zOn)return;slideIdx=(slideIdx+1)%slideImgs.length;syncSlider();},4000);}
  function stopTimer(){if(slideTimer){clearInterval(slideTimer);slideTimer=null;}}
  function resetTimer(){stopTimer();startTimer();}

  /* ZOOM INTERACTIVO: toca donde quieras → amplía ahí → arrastra para explorar */
  function getActImg(){var ss=document.querySelectorAll('#mBox .m-slide');return(ss&&slideIdx<ss.length)?ss[slideIdx].querySelector('img'):null;}
  function getActSlide(){var ss=document.querySelectorAll('#mBox .m-slide');return(ss&&slideIdx<ss.length)?ss[slideIdx]:null;}

  function zoomAt(cx,cy){
    var img=getActImg();if(!img)return;
    var r=img.getBoundingClientRect();
    if(!r.width||!r.height)return;
    zOX=Math.max(5,Math.min(95,(cx-r.left)/r.width*100));
    zOY=Math.max(5,Math.min(95,(cy-r.top)/r.height*100));
    img.style.transition='transform .22s ease';
    img.style.transformOrigin=zOX+'% '+zOY+'%';
    img.style.transform='scale('+SCALE+')';
    zOn=true;
    var s=getActSlide();if(s)s.classList.add('zoomed');
    var car=document.getElementById('mCar');if(car)car.classList.add('car-zoomed');
    stopTimer();
  }

  function zoomOut(){
    if(!zOn)return;
    var img=getActImg();
    if(img){img.style.transition='transform .22s ease';img.style.transform='scale(1)';img.style.transformOrigin='50% 50%';}
    document.querySelectorAll('#mBox .m-slide').forEach(function(s){s.classList.remove('zoomed');});
    var car=document.getElementById('mCar');if(car)car.classList.remove('car-zoomed');
    zOn=false;zOX=50;zOY=50;
    if(document.getElementById('modalProd')&&document.getElementById('modalProd').classList.contains('show'))startTimer();
  }

  function panZoom(dx,dy){
    var img=getActImg();if(!img||!zOn)return;
    var fw=img.offsetWidth||300,fh=img.offsetHeight||300;
    var nx=Math.max(5,Math.min(95,zOX0-(dx/fw*100)));
    var ny=Math.max(5,Math.min(95,zOY0-(dy/fh*100)));
    img.style.transition='none';
    img.style.transformOrigin=nx+'% '+ny+'%';
    img.style.transform='scale('+SCALE+')';
    zOX=nx;zOY=ny;
  }

  /* EVENTOS UNIFICADOS: touch + mouse */
  function onDown(e){
    var p=e.touches?e.touches[0]:e;
    ptDn=true;ptMv=false;ptX0=p.clientX;ptY0=p.clientY;
    zOX0=zOX;zOY0=zOY;
    var img=getActImg();if(img&&zOn)img.style.transition='none';
    if(e.type==='mousedown')e.preventDefault();
  }
  function onMove(e){
    if(!ptDn)return;
    var p=e.touches?e.touches[0]:e;
    var dx=p.clientX-ptX0,dy=p.clientY-ptY0;
    if(Math.abs(dx)>7||Math.abs(dy)>7)ptMv=true;
    if(zOn){if(e.cancelable)e.preventDefault();panZoom(dx,dy);}
  }
  function onUp(e){
    if(!ptDn)return;ptDn=false;
    var p=e.changedTouches?e.changedTouches[0]:e;
    var dx=p.clientX-ptX0;
    if(zOn){if(!ptMv)zoomOut();}
    else{if(!ptMv){zoomAt(p.clientX,p.clientY);}else if(Math.abs(dx)>45&&slideImgs.length>1){nextSlide(dx<0?1:-1);}}
  }

  /* FORMULARIO */
  function abrirForm(){
    if(!prod)return;
    document.getElementById('fPNom').textContent=prod.nombre;
    document.getElementById('fPPrecio').textContent=fmtP(prod.precioContado);
    document.getElementById('fNom').value='';document.getElementById('fCel').value='';document.getElementById('fDir').value='';
    document.getElementById('modalProd').classList.remove('show');
    document.getElementById('modalForm').classList.add('show');
    stopTimer();
    setTimeout(function(){var e=document.getElementById('fNom');if(e)e.focus();},300);
  }
  function cerrarForm(){
    document.getElementById('modalForm').classList.remove('show');
    if(prod){document.getElementById('modalProd').classList.add('show');startTimer();}
  }

  function enviarWA(){
    var nom=document.getElementById('fNom').value.trim();
    var cel=document.getElementById('fCel').value.trim();
    var dir=document.getElementById('fDir').value.trim();
    if(!nom||!cel||!dir){alert('Por favor completa tu nombre, celular y direcci\u00f3n.');return;}
    var em=getEm(prod.categoria);
    var NL=String.fromCharCode(10);
    var msg='Hola Atarashi Outlet, estoy interesado en el producto '+prod.nombre+
      ' ('+em+' '+prod.categoria+') para pago contra entrega. coordinamos para que envies '+prod.nombre+'.'+
      NL+NL+'Mis datos de entrega:'+NL+'Nombre: '+nom+NL+'Celular: '+cel+NL+'Direcci\u00f3n: '+dir+NL+'Precio: '+fmtP(prod.precioContado);
    window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(msg),'_blank');
    cerrarForm();
  }

  inicializar();
<\/script>
</body>
</html>`;
}

  .campo-modal label { display:block; font-size:11px; color:var(--gris); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
  .campo-modal input { width:100%; background:#0d0d0d; border:1px solid rgba(201,160,42,.3); color:#fff; padding:10px 12px; border-radius:6px; font-family:var(--cuerpo); font-size:14px; outline:none; }
  .campo-modal input:focus { border-color:var(--oro); }
  .btn-wa { width:100%; background:#25D366; color:#fff; border:none; padding:14px; border-radius:8px; font-weight:900; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; text-transform:uppercase; letter-spacing:.5px; margin-top:6px; transition:background .2s; }
  .btn-wa:hover { background:#1eb358; }
  .nota-wa { font-size:10px; color:var(--gris); text-align:center; margin-top:10px; line-height:1.5; }
</style>
</head>
<body>

<!-- ── PORTADA ── -->
<div class="portada" id="portada">
  <div class="linea-top"></div>
  <div class="linea-bot"></div>

  <div class="logo-portada">ATARASHI <span>STORE</span></div>
  <p class="sub-portada">Tu tienda en Cali, Colombia</p>

  <div class="divisor"></div>

  <h1 class="titulo-portada">
    ¿Para qué ir al centro<br>
    si el centro <span class="oro">puede ir a ti?</span>
  </h1>
  <p class="desc-portada">
    Compra desde cualquier lugar de Cali y recibe tus<br>
    productos con <strong>pago contraentrega</strong>. Sin filas, sin tráfico,<br>
    sin perder tiempo y con la tranquilidad de pagar solo al recibir.
  </p>

  <div class="pills">
    <span class="pill">🚚 Entrega a domicilio</span>
    <span class="pill">✅ Paga al recibir</span>
    <span class="pill">📦 Sin riesgos</span>
  </div>

  <button class="btn-portada" onclick="(function(){var p=document.getElementById('portada');p.style.transition='opacity 0.35s';p.style.opacity='0';setTimeout(function(){p.style.display='none';},360)})()">VER CATÁLOGO →</button>
  <span class="nota-portada">Cali · Colombia · Pagos solo en efectivo al recibir</span>
</div>

<!-- ── HEADER ── -->
<header class="site-header">
  <h1>ATARASHI <span>STORE</span></h1>
  <small>Pago Contraentrega · Cali</small>
</header>

<!-- TRUST BAR -->
<div class="trust-bar">
  <span class="trust-item">🚚 Domicilio Express en Cali</span>
  <span class="trust-item">✅ Pagas cuando llega</span>
  <span class="trust-item">📦 Cero riesgos para ti</span>
  <span class="trust-item">💬 Atención por WhatsApp</span>
</div>

<!-- ── CATÁLOGO ── -->
<div class="contenedor">
  <div class="filtros-wrap">
    <div class="filtros" id="filtrosContainer"></div>
  </div>
  <div class="grid-productos" id="gridProductos"></div>
</div>

<!-- ── MODAL PEDIDO ── -->
<div class="modal-bg" id="modalPedido" onclick="cerrarModalExt(event)">
  <div class="modal-box">
    <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
    <div class="modal-logo">ATARASHI <span>STORE</span></div>
    <p class="modal-sub">Confirmar pedido — Pago al recibir</p>

    <div class="modal-resumen">
      <p class="modal-prod-nombre" id="mProdNombre">—</p>
      <p class="modal-prod-precio" id="mProdPrecio">$0</p>
      <p class="modal-prod-cat"    id="mProdCat">—</p>
    </div>

    <div class="campo-modal">
      <label>Tu nombre completo *</label>
      <input type="text" id="mNombre" placeholder="Ej: Juan Pérez" autocomplete="name">
    </div>
    <div class="campo-modal">
      <label>Tu número WhatsApp / celular *</label>
      <input type="tel" id="mCelular" placeholder="Ej: 300 123 4567" autocomplete="tel">
    </div>
    <div class="campo-modal">
      <label>Dirección de entrega en Cali *</label>
      <input type="text" id="mDireccion" placeholder="Ej: Cra 50 #20-15, Aguablanca">
    </div>

    <button class="btn-wa" onclick="confirmarPedidoWA()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      CONFIRMAR PEDIDO POR WHATSAPP
    </button>
    <p class="nota-wa">Al tocar el botón se abrirá WhatsApp con tu pedido listo. Solo presiona Enviar. Nos contactaremos para coordinar la entrega.</p>
  </div>
</div>

<script>
  var prodData    = ${prodJSON};
  var catData     = ${catJSON};
  var WA_NUMERO   = '${waNum}';
  var prodActivo  = null;

  function cerrarPortada() {
    var p = document.getElementById('portada');
    if (!p) return;
    p.style.transition = 'opacity 0.35s ease';
    p.style.opacity = '0';
    p.style.pointerEvents = 'none';
    setTimeout(function(){ p.style.display = 'none'; }, 360);
  }

  function formatPrecio(v) {
    return '$' + Math.round(v).toLocaleString('es-CO');
  }

  function getEmoji(nombreCat) {
    var cat = catData.find(function(c){ return c.nombre === nombreCat; });
    return cat ? cat.emoji : '📦';
  }

  // ── FILTROS ──
  var filtroActivo = 'todos';

  function generarFiltros() {
    var cont = document.getElementById('filtrosContainer');
    cont.innerHTML = '';

    var btnTodos = document.createElement('button');
    btnTodos.className = 'btn-filtro activo';
    btnTodos.textContent = 'Todos';
    btnTodos.onclick = function(){ filtrar('todos', this); };
    cont.appendChild(btnTodos);

    catData.forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'btn-filtro';
      btn.textContent = cat.emoji + ' ' + cat.nombre;
      btn.onclick = function(){ filtrar(cat.nombre, this); };
      cont.appendChild(btn);
    });
  }

  function filtrar(val, btn) {
    document.querySelectorAll('.btn-filtro').forEach(function(b){ b.classList.remove('activo'); });
    filtroActivo = val;
    btn.classList.add('activo');
    renderGrid();
  }

  // ── GRID DE PRODUCTOS ──
  function renderGrid() {
    var grid = document.getElementById('gridProductos');
    grid.innerHTML = '';

    var lista = filtroActivo === 'todos'
      ? prodData
      : prodData.filter(function(p){ return p.categoria === filtroActivo; });

    if (lista.length === 0) {
      grid.innerHTML = '<p style="color:var(--gris);text-align:center;padding:40px;grid-column:1/-1;">No hay productos en esta categoría por ahora.</p>';
      return;
    }

    lista.forEach(function(prod) {
      var emoji      = getEmoji(prod.categoria);
      var badgeHtml  = prod.badge ? '<span class="tarjeta-badge">' + prod.badge + '</span>' : '';
      var disponHtml = prod.disponibilidad === 'transito'
        ? '<span class="entrega-badge">🚚 En camino — Reserva ya</span>'
        : '<span class="entrega-badge">✅ Entrega inmediata</span>';

      var card = document.createElement('div');
      card.className = 'tarjeta';
      card.innerHTML =
        badgeHtml +
        '<div class="tarjeta-img"><img src="' + (prod.imagenes[0] || '') + '" alt="' + prod.nombre + '" loading="lazy"></div>' +
        '<div class="tarjeta-info">' +
          '<p class="tarjeta-cat">' + emoji + ' ' + prod.categoria + '</p>' +
          '<h3 class="tarjeta-nombre">' + prod.nombre + '</h3>' +
          '<div class="precio-wrapper"><span class="precio-grande">' + formatPrecio(prod.precioContado) + '</span></div>' +
          disponHtml +
        '</div>' +
        '<button class="btn-pedir" data-id="' + prod.id + '">📲 Pedir y Pagar al Recibir</button>';

      card.querySelector('.btn-pedir').onclick = function(){ abrirModal(prod.id); };
      grid.appendChild(card);
    });
  }

  // ── MODAL PEDIDO ──
  function abrirModal(id) {
    var prod = prodData.find(function(p){ return p.id === id; });
    if (!prod) return;
    prodActivo = prod;

    document.getElementById('mProdNombre').textContent = prod.nombre;
    document.getElementById('mProdPrecio').textContent = formatPrecio(prod.precioContado);
    document.getElementById('mProdCat').textContent    = getEmoji(prod.categoria) + ' ' + prod.categoria + ' · PAGO AL RECIBIR';

    // Limpiar campos anteriores
    document.getElementById('mNombre').value    = '';
    document.getElementById('mCelular').value   = '';
    document.getElementById('mDireccion').value = '';

    document.getElementById('modalPedido').classList.add('show');
    document.getElementById('mNombre').focus();
  }

  function cerrarModal() { document.getElementById('modalPedido').classList.remove('show'); prodActivo = null; }
  function cerrarModalExt(e) { if (e.target.id === 'modalPedido') cerrarModal(); }

  // ── WHATSAPP ──
  function confirmarPedidoWA() {
    if (!prodActivo) return;
    var nombre    = document.getElementById('mNombre').value.trim();
    var celular   = document.getElementById('mCelular').value.trim();
    var direccion = document.getElementById('mDireccion').value.trim();

    if (!nombre || !celular || !direccion) {
      alert('Por favor completa tu nombre, celular y dirección de entrega.');
      return;
    }

    var emoji = getEmoji(prodActivo.categoria);
    var msg =
      'Hola Atarashi Outlet, estoy interesado en el producto ' + prodActivo.nombre +
      ' (' + emoji + ' ' + prodActivo.categoria + ')' +
      ' para pago contra entrega. coordinamos para que envies ' + prodActivo.nombre + '.' +
      '\n\n' +
      '📋 *Mis datos de entrega:*' +
      '\n👤 Nombre: ' + nombre +
      '\n📞 Celular: ' + celular +
      '\n📍 Dirección: ' + direccion +
      '\n💰 Precio confirmado: ' + formatPrecio(prodActivo.precioContado);

    var waUrl = 'https://wa.me/' + WA_NUMERO + '?text=' + encodeURIComponent(msg);
    window.open(waUrl, '_blank');
    cerrarModal();
  }

  // ── INICIALIZAR ──
  generarFiltros();
  renderGrid();
<\/script>
</body>
</html>`;
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 9 — INICIALIZACIÓN
// ═══════════════════════════════════════════════════════════

renderCategoriasUI();
renderTabla();

// Carga automática si hay token guardado
if (localStorage.getItem('atarashi_cloud_token')) {
  cargarDesdeGitHub();
}
</script>
</body>
</html>
