<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atarashi MASTER — Ventas Contado</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght=400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --negro-fondo: #0a0a0a;
    --negro-tarjeta: #121212;
    --negro-panel: #181818;
    --dorado: #C9A02A;
    --dorado-brillante: #F0C040;
    --blanco: #F5F2EA;
    --gris: #888880;
    --fuente-titulo: 'Bebas Neue', sans-serif;
    --fuente-cuerpo: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--negro-fondo); font-family: var(--fuente-cuerpo); color: var(--blanco); padding: 20px 12px 60px; }

  header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(201,160,42,0.1); }
  header h1 { font-family: var(--fuente-titulo); font-size: 42px; letter-spacing: 4px; color: var(--blanco); }
  header h1 span { color: var(--dorado-brillante); }
  header p { font-size: 14px; color: var(--gris); margin-top: 5px; font-weight: bold; }

  .contenedor-master { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 30px; }
  @media(min-width: 900px) { .contenedor-master { grid-template-columns: 400px 1fr; } }

  .panel-formulario { background: var(--negro-panel); border: 1px solid var(--dorado); border-radius: 12px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
  .panel-formulario h2 { font-family: var(--fuente-titulo); font-size: 26px; letter-spacing: 1px; margin-bottom: 15px; color: var(--dorado); }
  
  .caja-admin-categorias { background: rgba(255,255,255,0.02); border: 1px solid rgba(201,160,42,0.2); border-radius: 8px; padding: 12px; margin-bottom: 20px; }
  .caja-admin-categorias h3 { font-size: 13px; text-transform: uppercase; color: var(--dorado); margin-bottom: 8px; letter-spacing: 0.5px; }
  .lista-tags-categorias { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag-cat { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .btn-borrar-cat { background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; font-size: 12px; }
  .form-nueva-cat { display: flex; gap: 4px; }

  .grupo-campo { margin-bottom: 12px; }
  .grupo-campo label { display: block; font-size: 12px; color: var(--gris); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
  .grupo-campo input, .grupo-campo select { width: 100%; background: #0d0d0d; border: 1px solid rgba(201,160,42,0.3); color: #fff; padding: 10px; border-radius: 6px; font-family: var(--fuente-cuerpo); font-size: 14px; outline: none; }
  .grupo-campo input:focus, .grupo-campo select:focus { border-color: var(--dorado-brillante); }
  
  .caja-paso-uno { background: rgba(201,160,42,0.05); border: 1px dashed rgba(201,160,42,0.3); padding: 12px; border-radius: 8px; margin-bottom: 15px; }

  .precio-input-destacado { border: 2px solid var(--dorado-brillante) !important; font-size: 18px !important; font-weight: bold; color: var(--dorado-brillante) !important; }

  .btn-primario { width: 100%; background: var(--dorado); color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: background 0.2s; }
  .btn-primario:hover { background: var(--dorado-brillante); }

  .btn-descargar { width: 100%; background: #155724; color: #d4edda; border: 1px solid #c3e6cb; padding: 12px; border-radius: 6px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-descargar:hover { background: #1e7e34; }

  .panel-lista h2 { font-family: var(--fuente-titulo); font-size: 28px; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid rgba(201,160,42,0.1); padding-bottom: 5px; }
  .tabla-productos { width: 100%; border-collapse: collapse; background: var(--negro-tarjeta); border-radius: 8px; overflow: hidden; }
  .tabla-productos th, .tabla-productos td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .tabla-productos th { background: rgba(201,160,42,0.1); color: var(--dorado); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
  .mini-img { width: 45px; height: 45px; object-fit: contain; background: #1a1a1a; border-radius: 4px; border: 1px solid rgba(201,160,42,0.2); }
  .btn-tabla { color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 4px; }
  .btn-editar { background: #0056b3; } .btn-eliminar { background: #721c24; }

  .preview-fotos-caja { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .preview-foto-wrapper { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
  .preview-mini-foto { width: 100%; height: 100%; object-fit: cover; border: 1px solid var(--dorado); border-radius: 4px; }
  .preview-foto-x { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #ff4444; color: #fff; border: none; border-radius: 50%; font-size: 11px; cursor: pointer; font-weight: 900; }
</style>
</head>
<body>

  <header>
    <h1>ATARASHI <span>VENTAS CONTADO</span></h1>
    <p>Panel de Control Exclusivo para Ventas Inmediatas (CRO)</p>
  </header>

  <div id="statusNube" style="text-align: center; background: #111; padding: 10px; border-radius: 8px; margin: -10px auto 25px; max-width: 1200px; font-size: 13px; border: 1px solid #222;">
    Estado: <span id="statusTexto" style="color: #e67e22; font-weight: bold;">⏳ Esperando configuración...</span>
    <button style="margin-left: 10px; background: #333; color: #fff; border: 1px solid var(--dorado); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;" onclick="configurarTokenManualmente()">🔑 GitHub Token</button>
    <button style="margin-left: 6px; background: #333; color: #fff; border: 1px solid #7B68EE; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;" onclick="configurarCloudinary()">☁️ Cloudinary</button>
  </div>

  <div class="contenedor-master">
    
    <div class="panel-formulario">
      <div class="caja-admin-categorias">
        <h3>📁 Categorías (Obligatorio en Singular)</h3>
        <div class="lista-tags-categorias" id="listaCategoriasContenedor"></div>
        <div class="form-nueva-cat">
          <select id="newCatEmoji" style="width: 30%; background: #0d0d0d; border: 1px solid rgba(201,160,42,0.3); color:#fff; border-radius:6px;">
            <option value="👩">👩 Mujer</option>
            <option value="👨">👨 Hombre</option>
            <option value="👟">👟 Tenis</option>
            <option value="💻">💻 Tech</option>
          </select>
          <input type="text" id="newCatNombre" placeholder="Ej: Dama" style="width: 50%;">
          <button type="button" class="btn-primario" style="margin:0; padding:8px; font-size:11px; width:20%;" onclick="agregarNuevaCategoria()">+ OK</button>
        </div>
      </div>

      <h2 id="tituloFormulario">Añadir Producto (Contado)</h2>
      <form id="formProducto" onsubmit="guardarFormulario(event)">
        <input type="hidden" id="pIdModo" value="">

        <div class="caja-paso-uno">
          <div class="grupo-campo" style="margin-bottom: 0;">
            <label style="color: var(--dorado-brillante);">1. Fotos (Cloudinary)</label>
            <input type="file" id="pArchivosFotos" multiple accept="image/*" onchange="procesarFotos(this)">
            <div class="preview-fotos-caja" id="previewFotosContenedor"></div>
          </div>
        </div>

        <div class="grupo-campo">
          <label>Nombre del Producto</label>
          <input type="text" id="pNombre" required placeholder="Ej. NIKE DUNK LOW">
        </div>

        <div class="grupo-campo">
          <label>Categoría</label>
          <select id="pGenero"></select>
        </div>

        <div class="grupo-campo">
          <label>Gancho Comercial</label>
          <select id="pBadgeSelect">
            <option value="">🚫 Ninguna</option>
            <option value="🔥 TOP VENTAS">🔥 TOP VENTAS</option>
            <option value="📉 ÚLTIMAS UNIDADES">📉 ÚLTIMAS UNIDADES</option>
            <option value="💰 SÚPER PRECIO">💰 SÚPER PRECIO</option>
          </select>
        </div>

        <div class="grupo-campo">
          <label>Disponibilidad</label>
          <select id="pDisponibilidad">
            <option value="inmediata">✅ Entrega Inmediata</option>
            <option value="aparta">🚀 En Tránsito (Reserva)</option>
          </select>
        </div>

        <div class="grupo-campo">
          <label style="color: #FFD700; font-size: 14px;">PRECIO TOTAL DE CONTADO</label>
          <input type="number" id="pPrecioContado" class="precio-input-destacado" required placeholder="Ej. 180000">
        </div>

        <button type="submit" class="btn-primario" id="btnGuardarForm">Guardar Producto</button>
        <button type="button" class="btn-eliminar" id="btnCancelarEdit" style="display:none; width:100%; margin-top:8px; padding:10px;" onclick="cancelarEdicion()">Cancelar Edición</button>
      </form>

      <button class="btn-primario" id="btnCloudSync" style="background: #27ae60; color: white; margin-top: 15px;" onclick="publicarEnGitHub()">
        ⚡ PUBLICAR EN LA WEB (NUBE)
      </button>

      <button class="btn-descargar" onclick="descargarCatalogoCliente()">
        📦 DESCARGAR CATÁLOGO CLIENTE
      </button>
    </div>

    <div class="panel-lista">
      <h2>Inventario Contado (<span id="contador">0</span>)</h2>
      <table class="tabla-productos">
        <thead>
          <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaCuerpo"></tbody>
      </table>
    </div>

  </div>

<script>
  // SEPARACIÓN DE BASE DE DATOS: Usamos un JSON diferente para ventas de contado
  const ARCHIVO_DATOS = "productos_contado.json"; 

  const CONFIG_GITHUB = {
    REPOSITORIO: "moneco615-boop/Atarashi-data",
    getToken: function() {
      let t = localStorage.getItem('atarashi_cloud_token');
      if(!t) { t = prompt("Token GitHub:"); if(t) localStorage.setItem('atarashi_cloud_token', t.trim()); }
      return t;
    }
  };

  const CONFIG_CLOUDINARY = {
    getCloudName: () => localStorage.getItem('atarashi_cloudinary_name') || '',
    getPreset: () => localStorage.getItem('atarashi_cloudinary_preset') || '',
    isReady: function() { return !!(this.getCloudName() && this.getPreset()); }
  };

  function configurarCloudinary() {
    const nombre = prompt("Cloud Name:", CONFIG_CLOUDINARY.getCloudName());
    if(!nombre) return;
    localStorage.setItem('atarashi_cloudinary_name', nombre.trim());
    const preset = prompt("Upload Preset (ej: atarashi_panel):", CONFIG_CLOUDINARY.getPreset());
    if(!preset) return;
    localStorage.setItem('atarashi_cloudinary_preset', preset.trim());
    alert("✅ Cloudinary configurado.");
  }

  async function subirACloudinary(base64) {
    const formData = new FormData();
    formData.append('file', base64);
    formData.append('upload_preset', CONFIG_CLOUDINARY.getPreset());
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG_CLOUDINARY.getCloudName()}/image/upload`, { method: 'POST', body: formData });
    const data = await res.json();
    if(!res.ok) throw new Error("Error Cloudinary");
    return data.secure_url;
  }

  function configurarTokenManualmente() {
    let t = prompt("Token de GitHub:");
    if(t) { localStorage.setItem('atarashi_cloud_token', t.trim()); cargarDesdeGitHub(); }
  }

  let productos = JSON.parse(localStorage.getItem('atarashi_prod_contado')) || [];
  let imagenesCargadasActuales = [];
  
  // OBLIGATORIO: Categorías en singular
  let categoriasValidas = JSON.parse(localStorage.getItem('atarashi_cat_contado')) || [
    { emoji: "👩", nombre: "Dama" },
    { emoji: "👨", nombre: "Caballero" },
    { emoji: "👟", nombre: "Unisex" }
  ];

  function sincStorage() {
    localStorage.setItem('atarashi_prod_contado', JSON.stringify(productos));
    localStorage.setItem('atarashi_cat_contado', JSON.stringify(categoriasValidas));
  }

  function renderCategoriasUI() {
    const cont = document.getElementById('listaCategoriasContenedor');
    const sel = document.getElementById('pGenero');
    cont.innerHTML = ''; sel.innerHTML = '';
    categoriasValidas.forEach((cat, i) => {
      cont.innerHTML += `<span class="tag-cat">${cat.emoji} ${cat.nombre} <button class="btn-borrar-cat" onclick="categoriasValidas.splice(${i},1); sincStorage(); renderCategoriasUI();">×</button></span>`;
      sel.innerHTML += `<option value="${cat.nombre}">${cat.emoji} ${cat.nombre}</option>`;
    });
  }

  function agregarNuevaCategoria() {
    const nom = document.getElementById('newCatNombre').value.trim();
    if(!nom) return;
    const nomF = nom.charAt(0).toUpperCase() + nom.slice(1);
    categoriasValidas.push({ emoji: document.getElementById('newCatEmoji').value, nombre: nomF });
    document.getElementById('newCatNombre').value = '';
    sincStorage(); renderCategoriasUI();
  }

  function renderTabla() {
    const tbody = document.getElementById('tablaCuerpo');
    tbody.innerHTML = '';
    document.getElementById('contador').textContent = productos.length;
    productos.forEach((p, i) => {
      tbody.innerHTML += `
        <tr>
          <td><img src="${p.imagenes[0]}" class="mini-img"></td>
          <td style="font-weight:bold;">${p.nombre}</td>
          <td>${p.genero}</td>
          <td style="color:#FFD700; font-weight:bold;">$${p.precioContado.toLocaleString('es-CO')}</td>
          <td>
            <button class="btn-tabla btn-editar" onclick="cargarProductoParaEditar(${p.id})">Editar</button>
            <button class="btn-tabla btn-eliminar" onclick="productos.splice(${i},1); sincStorage(); renderTabla();">Borrar</button>
          </td>
        </tr>`;
    });
  }
