<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Atarashi Store — Pago Contraentrega Cali</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{--fo:#0a0a0a;--ca:#121212;--pa:#181818;--go:#C9A02A;--br:#F0C040;--wh:#F5F2EA;--gr:#888880;--T:'Bebas Neue',sans-serif;--B:'Outfit',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--fo);font-family:var(--B);color:var(--wh);min-height:100vh;}
.portada{position:fixed;inset:0;background:var(--fo);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;text-align:center;padding:24px 20px;}
.s-hdr{text-align:center;padding:16px 12px 11px;border-bottom:1px solid rgba(201,160,42,.1);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;padding:20px;}
.card{background:var(--ca);border:1px solid rgba(201,160,42,.12);border-radius:12px;overflow:hidden;padding:10px;cursor:pointer;}
.card-precio{font-family:var(--T);font-size:30px;color:var(--go);display:block;}
.card-cta{width:100%;background:#25D366;color:#fff;border:none;padding:10px;margin-top:10px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<div class="portada" id="portada">
    <h1>ATARASHI <span>STORE</span></h1>
    <button class="p-btn" onclick="document.getElementById('portada').style.display='none'">VER PRODUCTOS →</button>
</div>

<header class="s-hdr"><h1>ATARASHI <span>STORE</span></h1></header>
<div class="ctn"><div class="grid" id="grid"></div></div>

<!-- Botón flotante -->
<div id="btnCarrito" style="position:fixed; bottom:20px; right:20px; background:#C9A02A; padding:15px 25px; border-radius:30px; color:#000; font-weight:900; cursor:pointer; z-index:9999; display:none;" onclick="finalizarPedido()">
    🛒 <span id="txtTotal">Ver Carrito</span>
</div>

<script>
  var WA = '3197066369';
  var carrito = [];
  var PRODS = [];
  var MONTO_MINIMO = 50000;

  async function inicializar() {
    var res = await fetch('./productos_contado.json?t=' + Date.now());
    var data = await res.json();
    // Mezcla aleatoria
    PRODS = (data.productos || []).sort(() => Math.random() - 0.5);
    renderizar();
  }

  function renderizar() {
    var g = document.getElementById('grid');
    g.innerHTML = '';
    PRODS.forEach(p => {
      var div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${p.nombre}</h3><span class="card-precio">$${p.precioContado.toLocaleString()}</span>
                       <button class="card-cta" onclick="agregar(${p.precioContado}, '${p.nombre}')">AGREGAR</button>`;
      g.appendChild(div);
    });
  }

  function agregar(precio, nombre) {
    carrito.push({precio, nombre});
    var total = carrito.reduce((a, b) => a + b.precio, 0);
    var btn = document.getElementById('btnCarrito');
    btn.style.display = 'block';
    document.getElementById('txtTotal').innerText = 'Total: $' + total.toLocaleString();
    alert(nombre + ' agregado.');
  }

  function finalizarPedido() {
    var total = carrito.reduce((a, b) => a + b.precio, 0);
    if (total < MONTO_MINIMO) {
      alert('⚠️ El pedido mínimo es $50.000. Llevas $' + total.toLocaleString());
      return;
    }
    var msg = 'Hola, quiero pedir: ' + carrito.map(p => p.nombre).join(', ');
    window.open('https://wa.me/' + WA + '?text=' + encodeURIComponent(msg));
  }

  inicializar();
</script>

</body>
</html>
